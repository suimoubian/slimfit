name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Copy web assets
        run: |
          mkdir -p www
          cp -r index.html manifest.json sw.js recipes.json css js assets www/

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/slimfit.keystore \
            -alias slimfit \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASS }}" \
            -keypass "${{ secrets.KEYSTORE_PASS }}" \
            -dname "CN=SlimFit, OU=App, O=SlimFit, L=Beijing, ST=Beijing, C=CN"

      - name: Create keystore.properties
        run: |
          echo "storeFile=slimfit.keystore" > android/keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASS }}" >> android/keystore.properties
          echo "keyAlias=slimfit" >> android/keystore.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASS }}" >> android/keystore.properties

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          ./gradlew assembleDebug assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SlimFit-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SlimFit-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
